<style>
  :root{
    --navy:#1F3864; --navy-dark:#12213D; --navy-light:#2E4A7D;
    --gold:#C9A84C; --gold-light:#F3E9CE;
    --text:#EAEEF6; --muted:#9FB0CE;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:Arial,Helvetica,sans-serif;
    background:radial-gradient(circle at 50% 20%, var(--navy-light) 0%, var(--navy) 45%, var(--navy-dark) 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:32px 20px;
    overflow-x:hidden;
  }
  .mark{
    width:104px;height:104px;border-radius:22px;
    background:var(--gold);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 18px 50px rgba(0,0,0,.35);
    margin-bottom:28px;
    opacity:0;
    animation:riseIn .7s ease-out .1s forwards;
  }
  .mark svg{width:56px;height:56px;}
  .wordmark{
    font-size:clamp(28px,6vw,46px);
    font-weight:800;
    letter-spacing:2px;
    margin:0;
    opacity:0;
    animation:riseIn .7s ease-out .28s forwards;
  }
  .wordmark span{color:var(--gold);}
  .tagline{
    font-size:clamp(14px,2.4vw,18px);
    font-weight:600;
    color:var(--gold);
    text-transform:uppercase;
    letter-spacing:2.5px;
    margin:10px 0 26px;
    opacity:0;
    animation:riseIn .7s ease-out .42s forwards;
  }
  .lede{
    max-width:560px;
    font-size:16px;
    line-height:1.65;
    color:var(--muted);
    margin:0 0 38px;
    opacity:0;
    animation:riseIn .7s ease-out .56s forwards;
  }
  .lede b{color:var(--text);}
  .cta{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--gold);color:#2A2107;
    font-weight:800;font-size:15px;
    padding:15px 32px;border-radius:999px;
    text-decoration:none;
    box-shadow:0 10px 30px rgba(201,168,76,.25);
    opacity:0;
    animation:riseIn .7s ease-out .7s forwards;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .cta:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(201,168,76,.35);}
  .cta svg{width:16px;height:16px;transition:transform .18s ease;}
  .cta:hover svg{transform:translateX(3px);}
  .foot{
    position:absolute;bottom:26px;left:0;right:0;
    font-size:11.5px;color:#6E80A6;letter-spacing:.4px;
    padding:0 20px;
    opacity:0;
    animation:riseIn .7s ease-out .85s forwards;
  }
  @media (max-width:420px){
    .foot{font-size:10.5px;}
    .foot br{display:none;}
  }
  @keyframes riseIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){
    .mark,.wordmark,.tagline,.lede,.cta,.foot{animation:none;opacity:1;}
  }
  .skip-link{position:absolute;top:-40px;left:0;background:var(--navy-dark);color:#fff;padding:8px 14px;z-index:1000;font-size:13px;font-weight:700;text-decoration:none;border-radius:0 0 8px 0;}
  .skip-link:focus{top:0;}
  *:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
</style>
</head>
<body>
<a class="skip-link" href="#cta">Skip to content</a>

      <rect x="18" y="24" width="64" height="16" fill="#1F3864"/>
      <rect x="42" y="40" width="16" height="38" fill="#1F3864"/>
    </svg>
  </div>

  <h1 class="wordmark">TIESPRO<span>.</span></h1>
  <div class="tagline">Training Institute</div>

  <p class="lede">Turn a compulsory training spend into a funded, tax-efficient pipeline of <b>qualified, tenure-ready staff</b> — and let SETA funding be the bonus, not the plan.</p>
